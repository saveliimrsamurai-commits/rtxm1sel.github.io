<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>rEnAmE LOADER</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { border: 2px solid #00ff41; padding: 40px; box-shadow: 0 0 20px #00ff41; text-align: center; background: #000; }
        h1 { font-size: 2em; letter-spacing: 5px; margin-bottom: 20px; text-transform: uppercase; }
        .progress-bar { width: 300px; height: 10px; border: 1px solid #00ff41; position: relative; margin: 20px 0; }
        .progress-fill { height: 100%; background: #00ff41; width: 0%; animation: load 3s forwards; box-shadow: 0 0 10px #00ff41; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        .status { font-size: 0.8em; color: #008f11; }
        .btn { margin-top: 20px; display: inline-block; padding: 10px 20px; border: 1px solid #00ff41; color: #00ff41; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
    </style>
</head>
<body>
    <div class="box">
        <h1>rEnAmE LOADER</h1>
        <div class="status">INITIALIZING SYSTEM...</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="status">STATUS: <span style="color: #fff;">READY</span></div>
        <a href="#" class="btn">LAUNCH LOADER</a>
    </div>
</body>
</html>
